version: "3.9"

# Development override — hot reload + direct mounts
services:
  backend:
    build:
      context: ./backend
      target: deps
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DEBUG=true

  frontend:
    build: null
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: npm run dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
